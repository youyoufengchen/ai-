<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎙️ 与主播语音互动</title>
  <style>
    :root {
      --bg: #1a1410;
      --card: #241a14;
      --gold: #c9a55c;
      --gold-light: #e8d5a3;
      --text: #d4c4a8;
      --text-dim: #8a7b6c;
      --danger: #c75450;
      --success: #5a8f6e;
      --border: #3d2e1f;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .header h1 {
      font-size: 24px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 14px;
      color: var(--text-dim);
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    
    .input-group input:focus {
      border-color: var(--gold);
    }
    
    .feature-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .feature-option {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .feature-option:hover {
      border-color: var(--gold);
    }
    
    .feature-option.selected {
      border-color: var(--gold);
      background: rgba(201, 165, 92, 0.1);
    }
    
    .feature-option.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .feature-option .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .feature-option .label {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }
    
    .feature-option .desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--gold), #a08040);
      color: var(--bg);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 165, 92, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      background: var(--text-dim);
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      text-align: center;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status.waiting {
      background: rgba(201, 165, 92, 0.1);
      border: 1px solid var(--gold);
    }
    
    .status.active {
      background: rgba(90, 143, 110, 0.1);
      border: 1px solid var(--success);
    }
    
    .status.error {
      background: rgba(199, 84, 80, 0.1);
      border: 1px solid var(--danger);
    }
    
    .status .emoji {
      font-size: 48px;
      margin-bottom: 8px;
    }
    
    .status .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    
    .status .desc {
      font-size: 13px;
      color: var(--text-dim);
    }
    
    .queue-info {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 8px;
      margin-top: 16px;
    }
    
    .queue-info .item {
      text-align: center;
    }
    
    .queue-info .value {
      font-size: 24px;
      font-weight: bold;
      color: var(--gold);
    }
    
    .queue-info .label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    
    .cancel-btn {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid var(--danger);
      border-radius: 8px;
      background: transparent;
      color: var(--danger);
      font-size: 14px;
      cursor: pointer;
    }
    
    .cancel-btn:hover {
      background: rgba(199, 84, 80, 0.1);
    }
    
    .tips {
      background: var(--card);
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }
    
    .tips strong {
      color: var(--gold);
    }
    
    .tips ul {
      margin-top: 8px;
      padding-left: 20px;
    }
    
    .tips li {
      margin-bottom: 4px;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎙️ 语音互动</h1>
      <p>与主播进行语音交流</p>
    </div>
    
    <!-- 状态显示 -->
    <div id="status-box" class="status">
      <div class="emoji" id="status-emoji">⏳</div>
      <div class="title" id="status-title">准备中...</div>
      <div class="desc" id="status-desc">正在连接服务器</div>
    </div>
    
    <!-- 排队信息显示 -->
    <div id="queue-box" class="card" style="display:none;">
      <div class="queue-info">
        <div class="item">
          <div class="value" id="queue-position">-</div>
          <div class="label">当前位置</div>
        </div>
        <div class="item">
          <div class="value" id="queue-length">-</div>
          <div class="label">前方等待</div>
        </div>
        <div class="item">
          <div class="value" id="queue-time">-</div>
          <div class="label">已等待(秒)</div>
        </div>
      </div>
      <button class="cancel-btn" onclick="cancelQueue()">取消排队</button>
    </div>
    
    <!-- 加入表单 -->
    <div id="join-form">
      <div class="card">
        <div class="input-group">
          <label>你的名字</label>
          <input type="text" id="username" placeholder="输入昵称" maxlength="20">
        </div>
        
        <label style="font-size:13px;color:var(--text-dim);margin-bottom:8px;display:block;">选择互动方式</label>
        <div class="feature-select">
          <div class="feature-option" id="opt-message" onclick="selectFeature('message')">
            <div class="icon">💬</div>
            <div class="label">语音消息</div>
            <div class="desc">按住说话，松开发送</div>
          </div>
          <div class="feature-option" id="opt-call" onclick="selectFeature('call')">
            <div class="icon">📞</div>
            <div class="label">实时通话</div>
            <div class="desc">与主播语音对话</div>
          </div>
        </div>
        
        <button class="btn" id="join-btn" onclick="joinQueue()">开始排队</button>
      </div>
      
      <div class="tips">
        <strong>💡 使用说明：</strong>
        <ul>
          <li>输入昵称并选择互动方式</li>
          <li>点击"开始排队"进入等待队列</li>
          <li>主播接受后会自动进入互动界面</li>
          <li>如选择通话模式，请注意通话时长限制</li>
          <li>可随时取消排队</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentRequestId = null;
    let currentSessionId = null;
    let selectedFeature = 'message';
    let statusCheckTimer = null;
    let waitingStartTime = null;
    
    // 初始化
    async function init() {
      // 检查系统状态
      await checkSystemStatus();
      
      // 生成随机用户名
      document.getElementById('username').value = '观众' + Math.floor(Math.random() * 10000);
      
      // 默认选择语音消息
      selectFeature('message');
    }
    
    // 检查系统状态
    async function checkSystemStatus() {
      try {
        const r = await fetch(`${API_BASE}/api/voice/queue`);
        const data = await r.json();
        
        if (!data.ok) {
          showStatus('error', '❌', '系统错误', '请稍后重试');
          return;
        }
        
        const config = data.config;
        
        // 更新功能可用性
        if (!config.voice_message_enabled) {
          document.getElementById('opt-message').classList.add('disabled');
          document.getElementById('opt-message').onclick = null;
        }
        
        if (!config.voice_call_enabled) {
          document.getElementById('opt-call').classList.add('disabled');
          document.getElementById('opt-call').onclick = null;
        }
        
        if (!config.voice_message_enabled && !config.voice_call_enabled) {
          showStatus('error', '🚫', '功能未开启', '语音互动功能当前未开放');
          document.getElementById('join-btn').disabled = true;
          return;
        }
        
        showStatus('waiting', '✨', '准备就绪', '请选择互动方式并加入排队');
        
      } catch (e) {
        showStatus('error', '❌', '连接失败', '无法连接到服务器');
      }
    }
    
    // 选择功能
    function selectFeature(feature) {
      if (document.getElementById(`opt-${feature}`).classList.contains('disabled')) {
        return;
      }
      
      selectedFeature = feature;
      document.querySelectorAll('.feature-option').forEach(el => el.classList.remove('selected'));
      document.getElementById(`opt-${feature}`).classList.add('selected');
    }
    
    // 加入排队
    async function joinQueue() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        alert('请输入你的名字');
        return;
      }
      
      const userId = 'user_' + Date.now();
      
      try {
        document.getElementById('join-btn').disabled = true;
        document.getElementById('join-btn').innerHTML = '<span class="loading"></span>';
        
        const r = await fetch(`${API_BASE}/api/voice/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: username,
            user_id: userId,
            feature: selectedFeature
          })
        });
        
        const data = await r.json();
        
        if (!data.success) {
          alert(data.error || '加入排队失败');
          document.getElementById('join-btn').disabled = false;
          document.getElementById('join-btn').textContent = '开始排队';
          return;
        }
        
        currentRequestId = data.request_id;
        waitingStartTime = Date.now();
        
        // 显示排队界面
        document.getElementById('join-form').style.display = 'none';
        document.getElementById('queue-box').style.display = 'block';
        
        updateQueueDisplay(data);
        showStatus('waiting', '⏳', '排队中', `当前位置: 第${data.position}位，预计等待${data.estimated_wait}秒`);
        
        // 开始轮询状态
        startStatusCheck();
        
      } catch (e) {
        alert('网络错误，请重试');
        document.getElementById('join-btn').disabled = false;
        document.getElementById('join-btn').textContent = '开始排队';
      }
    }
    
    // 开始状态轮询
    function startStatusCheck() {
      statusCheckTimer = setInterval(async () => {
        if (!currentRequestId) return;
        
        try {
          const r = await fetch(`${API_BASE}/api/voice/queue?request_id=${currentRequestId}`);
          const data = await r.json();
          
          if (!data.ok) return;
          
          // 检查是否被接受
          const myRequest = data.waiting_list?.find(r => r.request_id === currentRequestId);
          
          if (!myRequest) {
            // 可能已被接受或已移除
            const activeSession = data.active_list?.find(s => s.request_id === currentRequestId);
            if (activeSession) {
              // 被接受了！
              currentSessionId = activeSession.session_id;
              enterVoiceRoom(activeSession);
            } else {
              // 可能被拒绝了
              showStatus('error', '❌', '连接中断', '请重新加入排队');
              resetToJoinForm();
            }
            return;
          }
          
          // 更新排队显示
          updateQueueDisplay({
            position: myRequest.position,
            queue_length: data.queue_length,
            estimated_wait: myRequest.wait_time
          });
          
          // 更新已等待时间
          const waited = Math.floor((Date.now() - waitingStartTime) / 1000);
          document.getElementById('queue-time').textContent = waited;
          
        } catch (e) {
          console.error('状态检查失败:', e);
        }
      }, 2000);
    }
    
    // 更新排队显示
    function updateQueueDisplay(data) {
      document.getElementById('queue-position').textContent = data.position || '-';
      document.getElementById('queue-length').textContent = Math.max(0, (data.position || 1) - 1);
    }
    
    // 进入语音房间
    function enterVoiceRoom(session) {
      clearInterval(statusCheckTimer);
      
      showStatus('active', '🎙️', '已连接！', '正在进入语音房间...');
      
      // 跳转到语音页面
      const feature = session.feature;
      window.location.href = `/voice/${feature}?session_id=${session.session_id}`;
    }
    
    // 取消排队
    async function cancelQueue() {
      if (!currentRequestId) return;
      
      if (!confirm('确定要取消排队吗？')) return;
      
      try {
        const r = await fetch(`${API_BASE}/api/voice/cancel`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ request_id: currentRequestId })
        });
        
        clearInterval(statusCheckTimer);
        currentRequestId = null;
        
        resetToJoinForm();
        showStatus('waiting', '✨', '已取消', '可以随时重新加入排队');
        
      } catch (e) {
        alert('取消失败，请重试');
      }
    }
    
    // 重置到加入表单
    function resetToJoinForm() {
      document.getElementById('join-form').style.display = 'block';
      document.getElementById('queue-box').style.display = 'none';
      document.getElementById('join-btn').disabled = false;
      document.getElementById('join-btn').textContent = '开始排队';
      currentRequestId = null;
      clearInterval(statusCheckTimer);
    }
    
    // 显示状态
    function showStatus(type, emoji, title, desc) {
      const box = document.getElementById('status-box');
      box.className = 'status show ' + type;
      document.getElementById('status-emoji').textContent = emoji;
      document.getElementById('status-title').textContent = title;
      document.getElementById('status-desc').textContent = desc;
    }
    
    // 启动
    init();
  </script>
</body>
</html>
