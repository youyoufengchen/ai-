<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎙️ 与NPC语音对话</title>
  <style>
    :root {
      --bg: #1a1410;
      --card: #241a14;
      --gold: #c9a55c;
      --gold-light: #e8d5a3;
      --text: #d4c4a8;
      --text-dim: #8a7b6c;
      --danger: #c75450;
      --success: #5a8f6e;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .header {
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 20px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 14px;
      color: var(--text-dim);
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 20px;
    }
    
    .status-badge.connecting {
      background: #3a3a20;
      color: #b8b060;
    }
    
    .status-badge.ready {
      background: #203a25;
      color: #60b870;
    }
    
    .status-badge.recording {
      background: #3a2020;
      color: #ff6b6b;
      animation: pulse 1s infinite;
    }
    
    .status-badge.processing {
      background: #202a3a;
      color: #60a0b8;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .voice-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, var(--gold), #a08040);
      color: var(--bg);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(201, 165, 92, 0.3);
      transition: all 0.3s ease;
      margin: 0 auto 30px;
    }
    
    .voice-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(201, 165, 92, 0.4);
    }
    
    .voice-btn:active {
      transform: scale(0.95);
    }
    
    .voice-btn.recording {
      background: linear-gradient(145deg, var(--danger), #a04040);
      box-shadow: 0 8px 32px rgba(199, 84, 80, 0.4);
      animation: recording-pulse 1s infinite;
    }
    
    @keyframes recording-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    .voice-btn .icon {
      font-size: 36px;
    }
    
    .voice-btn .text {
      font-size: 14px;
    }
    
    .wave-container {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .wave-container.active {
      opacity: 1;
    }
    
    .wave-bar {
      width: 4px;
      background: var(--gold);
      border-radius: 2px;
      animation: wave 0.5s ease-in-out infinite;
    }
    
    .wave-bar:nth-child(1) { animation-delay: 0s; height: 20px; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 35px; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 50px; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 35px; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 20px; }
    
    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }
    
    .timer {
      font-size: 24px;
      color: var(--gold);
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }
    
    .result-box {
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      text-align: left;
      display: none;
    }
    
    .result-box.show {
      display: block;
    }
    
    .result-box h3 {
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    
    .result-box p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }
    
    .tips {
      background: var(--card);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
      text-align: left;
    }
    
    .tips strong {
      color: var(--gold);
    }
    
    .error-box {
      background: #3a2020;
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: var(--danger);
      font-size: 14px;
      display: none;
    }
    
    .error-box.show {
      display: block;
    }
    
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="closePage()">&times;</button>
  
  <div class="container">
    <div class="header">
      <h1>🎙️ 与主播语音互动</h1>
      <p>按住按钮说话，说完松开发送</p>
    </div>
    
    <div class="error-box" id="error-box">
      无法访问麦克风，请检查权限设置
    </div>
    
    <div class="status-badge connecting" id="status-badge">连接中...</div>
    
    <div class="timer" id="timer">00:00</div>
    
    <div class="wave-container" id="wave-container">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    
    <button class="voice-btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" 
            ontouchstart="startRecording()" ontouchend="stopRecording()">
      <span class="icon">🎙️</span>
      <span class="text">按住说话</span>
    </button>
    
    <div class="result-box" id="result-box">
      <h3>识别结果</h3>
      <p id="result-text">-</p>
    </div>
    
    <div class="tips">
      <strong>💡 提示：</strong><br>
      • 请清晰地说出你想问的问题<br>
      • 每次说话最长60秒<br>
      • 说完后主播会语音回复你
    </div>
  </div>

  <script>
    // 从URL获取session_id
    const pathParts = window.location.pathname.split('/');
    const sessionId = pathParts[pathParts.length - 1];
    
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingStartTime = null;
    let timerInterval = null;
    let ws = null;
    
    const statusBadge = document.getElementById('status-badge');
    const voiceBtn = document.getElementById('voice-btn');
    const timer = document.getElementById('timer');
    const waveContainer = document.getElementById('wave-container');
    const errorBox = document.getElementById('error-box');
    const resultBox = document.getElementById('result-box');
    const resultText = document.getElementById('result-text');
    
    // 初始化WebSocket连接
    function initWebSocket() {
      const wsUrl = `ws://${window.location.host}/ws/voice/${sessionId}`;
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        statusBadge.textContent = '准备就绪';
        statusBadge.className = 'status-badge ready';
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };
      
      ws.onerror = (error) => {
        statusBadge.textContent = '连接失败';
        statusBadge.className = 'status-badge connecting';
        console.error('WebSocket error:', error);
      };
      
      ws.onclose = () => {
        statusBadge.textContent = '连接断开';
        statusBadge.className = 'status-badge connecting';
      };
    }
    
    // 处理服务器消息
    function handleServerMessage(data) {
      if (data.type === 'transcription') {
        resultText.textContent = data.text;
        resultBox.classList.add('show');
        statusBadge.textContent = '识别完成';
        statusBadge.className = 'status-badge ready';
      } else if (data.type === 'error') {
        showError(data.message);
      }
    }
    
    // 开始录音
    async function startRecording() {
      if (!sessionId || sessionId === 'voice') {
        showError('会话无效，请重新获取链接');
        return;
      }
      
      try {
        if (!mediaRecorder) {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          
          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };
          
          mediaRecorder.onstop = () => {
            sendAudioData();
          };
        }
        
        audioChunks = [];
        mediaRecorder.start(100); // 每100ms收集一次数据
        
        // 更新UI
        voiceBtn.classList.add('recording');
        voiceBtn.querySelector('.text').textContent = '松开发送';
        waveContainer.classList.add('active');
        statusBadge.textContent = '录音中...';
        statusBadge.className = 'status-badge recording';
        
        // 启动计时器
        recordingStartTime = Date.now();
        timerInterval = setInterval(updateTimer, 100);
        
      } catch (error) {
        console.error('录音启动失败:', error);
        showError('无法访问麦克风，请检查权限设置');
      }
    }
    
    // 停止录音
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      // 更新UI
      voiceBtn.classList.remove('recording');
      voiceBtn.querySelector('.text').textContent = '按住说话';
      waveContainer.classList.remove('active');
      statusBadge.textContent = '处理中...';
      statusBadge.className = 'status-badge processing';
      
      // 停止计时器
      clearInterval(timerInterval);
      timer.textContent = '00:00';
    }
    
    // 发送音频数据
    async function sendAudioData() {
      if (audioChunks.length === 0) return;
      
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      
      reader.onloadend = () => {
        const base64Audio = reader.result.split(',')[1];
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'voice_data',
            session_id: sessionId,
            audio: base64Audio
          }));
        }
      };
      
      reader.readAsDataURL(audioBlob);
    }
    
    // 更新计时器
    function updateTimer() {
      const elapsed = Date.now() - recordingStartTime;
      const seconds = Math.floor(elapsed / 1000);
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      
      timer.textContent = `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      
      // 最长60秒自动停止
      if (seconds >= 60) {
        stopRecording();
      }
    }
    
    // 显示错误
    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
      setTimeout(() => {
        errorBox.classList.remove('show');
      }, 5000);
    }
    
    // 关闭页面
    function closePage() {
      if (ws) {
        ws.close();
      }
      if (mediaRecorder && mediaRecorder.stream) {
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
      }
      window.close();
      // 如果window.close()被阻止，显示提示
      setTimeout(() => {
        alert('请手动关闭此页面返回直播间');
      }, 100);
    }
    
    // 初始化
    initWebSocket();
  </script>
</body>
</html>
